<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu VR — Código de Confirmação</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login-split.css">
    <style>
        #codigo {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            padding-left: 18px;
        }
    </style>
</head>

<body>
    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>

    <div class="split-container">
        <div class="split-left">
            <div class="burger-playground" id="burgerPlayground">
                <div class="drag-layer layer-pao-topo" data-layer="pao-topo"><img src="assets/pao_de_cima 1 (1).svg" alt="Pão do topo"></div>
                <div class="drag-layer layer-carne1" data-layer="carne1"><img src="assets/Carne-queijo.svg" alt="Carne"></div>
                <div class="drag-layer layer-tomate" data-layer="tomate"><img src="assets/Tomate.svg" alt="Tomate"></div>
                <div class="drag-layer layer-carne2" data-layer="carne2"><img src="assets/Carne-queijo.svg" alt="Carne"></div>
                <div class="drag-layer layer-alface" data-layer="alface"><img src="assets/Alface.svg" alt="Alface"></div>
                <div class="drag-layer layer-pao-baixo" data-layer="pao-baixo"><img src="assets/Pao_baixo.svg" alt="Pão de baixo"></div>
            </div>
            <button type="button" class="btn-remontar" id="btnRemontar">🍔 Remontar</button>
            <p class="playground-hint">Arraste as camadas do hambúrguer!</p>
        </div>

        <div class="split-right">
            <div class="form-card">
                <div class="logo-area"><img src="assets/Logo.svg" alt="Logo Menu VR"></div>
                <h1 class="form-title">Código de verificação</h1>
                <p class="form-subtitle">Insira o código de 6 dígitos enviado para seu e-mail</p>

                <div class="form-group">
                    <label for="codigo">Código</label>
                    <div class="input-wrap" id="wrap-codigo">
                        <input type="text" id="codigo" class="form-input" placeholder="000000" inputmode="numeric" autocomplete="one-time-code">
                    </div>
                    <span class="field-msg" id="msg-codigo"></span>
                </div>

                <button type="button" class="btn-entrar" id="btnSubmit" disabled>Confirmar</button>

                <div class="form-footer">
                    <a href="esqueci-senha.html">← Voltar</a>
                    <p class="slogan">BG Tech Solutions - Do Manual ao Genial</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
        <div class="modal-box">
            <div class="modal-check"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <h2 class="modal-title">Código confirmado!</h2>
            <p class="modal-sub">Identidade verificada com sucesso.<br>Agora crie sua nova senha.</p>
            <button type="button" class="modal-btn" id="modalOk">Criar Nova Senha</button>
        </div>
    </div>

    <script src="burger-validate.js"></script>
    <script src="login-split.js"></script>
    <script>
        (() => {
            const states = { codigo: false };
            const btn = document.getElementById('btnSubmit');
            const update = BurgerValidate.bindBtn(btn, states);

            BurgerValidate.bindCodigo(document.getElementById('codigo'), document.getElementById('wrap-codigo'), document.getElementById('msg-codigo'), 6, v => { states.codigo = v; update(); });

            btn.addEventListener('click', () => {
                if (!states.codigo) return;
                BurgerValidate.openModal(document.getElementById('modalBackdrop'));
            });
            BurgerValidate.bindModal(document.getElementById('modalBackdrop'), document.getElementById('modalOk'), 'nova-senha.html');
        })();
    </script>
</body>

</html>
