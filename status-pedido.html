<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhar Pedido - Menu VR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b; /* Amber */
            --primary-dark: #d97706;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --font: 'Inter', sans-serif;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            font-family: var(--font);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .tracker-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        .tracker-header {
            background: var(--text-color);
            color: white;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        .tracker-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .tracker-header p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .tracker-body {
            padding: 30px 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .btn-search {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            font-family: var(--font);
        }

        .btn-search:hover {
            background: var(--primary-dark);
        }

        /* Stepper */
        .stepper {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-top: 20px;
        }

        .stepper::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 10px;
            bottom: 10px;
            width: 3px;
            background: var(--border-color);
            z-index: 1;
        }

        .step {
            display: flex;
            gap: 20px;
            position: relative;
            z-index: 2;
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        .step.active {
            opacity: 1;
        }

        .step.completed .step-icon {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .step.current .step-icon {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.2);
        }

        .step-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 3px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .step-icon svg {
            width: 20px;
            height: 20px;
        }

        .step-content {
            padding-top: 8px;
        }

        .step-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-color);
            margin-bottom: 4px;
        }

        .step-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .order-info {
            margin-top: 30px;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 12px;
            display: none; /* hidden by default */
        }

        .order-info h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
        }

        .error-msg {
            color: #ef4444;
            text-align: center;
            margin-top: 10px;
            font-weight: 500;
            display: none;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .tracker-body {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>

    <div class="tracker-container">
        <div class="tracker-header">
            <h1>Acompanhar Pedido</h1>
            <p>Menu VR Delivery</p>
        </div>

        <div class="tracker-body">
            <div class="search-box">
                <input type="text" id="inputId" class="search-input" placeholder="Nº do Pedido (ex: 1045)" autocomplete="off">
                <button class="btn-search" id="btnBuscar">Buscar</button>
            </div>
            
            <div class="error-msg" id="errorMsg">Pedido não encontrado.</div>

            <div id="trackerStatus" style="display: none;">
                <div class="stepper" id="stepper">
                    <!-- Status 1: Pendente -->
                    <div class="step" data-step="pendente">
                        <div class="step-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                        </div>
                        <div class="step-content">
                            <div class="step-title">Pedido Recebido</div>
                            <div class="step-desc">Aguardando confirmação do restaurante.</div>
                        </div>
                    </div>

                    <!-- Status 2: Preparando -->
                    <div class="step" data-step="preparando">
                        <div class="step-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
                                <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
                                <line x1="6" y1="1" x2="6" y2="4"></line>
                                <line x1="10" y1="1" x2="10" y2="4"></line>
                                <line x1="14" y1="1" x2="14" y2="4"></line>
                            </svg>
                        </div>
                        <div class="step-content">
                            <div class="step-title">Em Preparo</div>
                            <div class="step-desc">Seu lanche está na chapa!</div>
                        </div>
                    </div>

                    <!-- Status 3: Em Rota -->
                    <div class="step" data-step="rota">
                        <div class="step-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="1" y="3" width="15" height="13"></rect>
                                <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                                <circle cx="5.5" cy="18.5" r="2.5"></circle>
                                <circle cx="18.5" cy="18.5" r="2.5"></circle>
                            </svg>
                        </div>
                        <div class="step-content">
                            <div class="step-title">Saiu para Entrega</div>
                            <div class="step-desc">O entregador está a caminho.</div>
                        </div>
                    </div>

                    <!-- Status 4: Entregue -->
                    <div class="step" data-step="entregue">
                        <div class="step-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                        </div>
                        <div class="step-content">
                            <div class="step-title">Entregue</div>
                            <div class="step-desc">Bom apetite!</div>
                        </div>
                    </div>
                </div>

                <div class="order-info" id="orderInfo">
                    <h3>Detalhes do Pedido</h3>
                    <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 5px;"><b>Cliente:</b> <span id="infoCliente"></span></div>
                    <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;"><b>Total:</b> <span id="infoTotal"></span></div>
                    <div style="font-size: 0.85rem; line-height: 1.5; color: var(--text-color);" id="infoItens"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Puxamos o script do Admin para ler o LocalStorage real -->
    <script src="admin.js"></script>
    <script>
        const btnBuscar = document.getElementById('btnBuscar');
        const inputId = document.getElementById('inputId');
        const errorMsg = document.getElementById('errorMsg');
        const trackerStatus = document.getElementById('trackerStatus');
        const orderInfo = document.getElementById('orderInfo');

        const stepOrder = ['pendente', 'preparando', 'rota', 'entregue'];

        function updateTracker(status) {
            const steps = document.querySelectorAll('.step');
            
            // Remove classes
            steps.forEach(s => s.classList.remove('active', 'completed', 'current'));

            const currentIndex = stepOrder.indexOf(status);

            steps.forEach((step, index) => {
                // If it's a past step
                if (index < currentIndex) {
                    step.classList.add('active', 'completed');
                } 
                // If it's the current step
                else if (index === currentIndex) {
                    step.classList.add('active', 'current');
                    if (status === 'entregue') {
                        step.classList.add('completed'); // entregue is both current and completed
                    }
                }
            });
        }

        function buscarPedido() {
            const id = inputId.value.trim();
            if (!id) return;

            const pedido = AdminStore.getPedidoById(id);

            if (pedido) {
                errorMsg.style.display = 'none';
                trackerStatus.style.display = 'block';
                orderInfo.style.display = 'block';

                document.getElementById('infoCliente').textContent = pedido.cliente;
                document.getElementById('infoTotal').textContent = AdminUI.formatPrice(pedido.total);
                document.getElementById('infoItens').textContent = pedido.itens;

                updateTracker(pedido.status);
            } else {
                errorMsg.style.display = 'block';
                trackerStatus.style.display = 'none';
                orderInfo.style.display = 'none';
            }
        }

        btnBuscar.addEventListener('click', buscarPedido);
        inputId.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscarPedido();
        });

        // Polling para simular "Tempo Real" (atualiza a cada 5 segundos)
        setInterval(() => {
            if (trackerStatus.style.display === 'block') {
                buscarPedido(); // Re-busca o pedido atual silenciosamente
            }
        }, 5000);
    </script>
</body>
</html>
