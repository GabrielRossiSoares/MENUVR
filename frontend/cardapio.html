<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu VR — Immersive Scrollytelling</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="cardapio.css">
</head>
<body>
    
    <!-- Canvas 3D de Fundo Absoluto -->
    <div id="canvas-container"></div>
    
    <!-- Fundo Granulado Estético (Light mode) -->
    <div class="noise-overlay"></div>

    <!-- Navegação (Mantida conforme solicitação do usuário) -->
    <header class="top-nav">
        <div class="categories-bar">
            <button class="cat-btn active" data-target="#section-mais-pedidos">Mais Pedidos</button>
            <button class="cat-btn" data-target="#section-hamburguers">Hamburguers</button>
            <button class="cat-btn" data-target="#section-combos">Combos</button>
            <button class="cat-btn" data-target="#section-sobremesas">Sobremesas</button>
            <button class="cat-btn" data-target="#section-drinks">Drinks</button>
            <button class="cat-btn" data-target="#section-bebidas">Bebidas</button>
        </div>
        <div class="nav-actions">
            <div class="cart-icon" id="cart-trigger">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart-badge">0</span>
            </div>
            <div class="login-icon" id="login-trigger" title="Entrar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
        </div>
    </header>

    <!-- Botão de Acessibilidade Flutuante (Injetado pelo JS, mas deixamos o estilo carregar) -->
    
    <!-- Dica de Interação Inicial -->
    <div class="scroll-hint">
        <span>Arraste para explorar o cardápio</span>
        <div class="mouse-icon"></div>
    </div>

    <!-- Conteúdo HTML sobreposto (Vitrine) -->
    <main id="scroll-container">
        <!-- Renderizado dinamicamente pelo JS -->
    </main>

    <!-- Modal do Carrinho (Drawer Lateral) -->
    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h3>Seu Carrinho</h3>
            <button id="close-cart" class="close-btn">&times;</button>
        </div>
        <div id="cart-items" class="cart-items-list">
            <!-- Itens rendrizados via JS -->
        </div>
        <div class="cart-footer">
            <div class="cart-total-row">
                <span>Total:</span>
                <span id="cart-total-value">R$ 0,00</span>
            </div>
            <button class="checkout-btn">Finalizar Pedido</button>
        </div>
    </div>
    <div id="modal-overlay" class="modal-overlay"></div>

    <!-- Modal de Detalhes do Produto (Fullscreen) -->
    <div id="product-detail-modal" class="pd-modal">
        <div class="pd-modal-content">
            <button class="pd-close" id="pd-close">&times;</button>
            <div class="pd-header">
                <h2 class="pd-title">Detalhes Do Produto</h2>
            </div>
            <div class="pd-body" id="pd-body">
                <!-- Renderizado via JS -->
            </div>
            <div class="pd-footer">
                <div class="pd-qty-controls">
                    <button class="pd-qty-btn" id="pd-minus">−</button>
                    <span class="pd-qty-value" id="pd-qty">1</span>
                    <button class="pd-qty-btn" id="pd-plus">+</button>
                </div>
                <button class="pd-add-btn" id="pd-add-btn">Adicionar (R$ 0,00)</button>
            </div>
        </div>
    </div>

    <!-- Footer do Restaurante -->
    <footer id="restaurant-footer" class="restaurant-footer">
        <!-- Renderizado via JS -->
    </footer>

    <!-- Banner de Cookies (LGPD) -->
    <div id="cookie-banner" class="cookie-banner">
        <div class="cookie-content">
            <p>Este website está em conformidade com a <strong>Lei Geral de Proteção de Dados (LGPD)</strong> e utiliza cookies para oferecer uma melhor experiência ao visitante.</p>
            <button id="cookie-accept" class="cookie-accept-btn">Concordo</button>
        </div>
    </div>

    <!-- Bibliotecas Externas para Scrollytelling e 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>
    
    <!-- Acessibilidade Global -->
    <script src="accessibility.js"></script>
    
    <script src="cardapio.js"></script>

    <!-- Motor de Realidade Aumentada (Invisível, usado como Trigger) -->
    <model-viewer id="ar-trigger" 
        src="assets/hamburguer.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        style="display: none;">
    </model-viewer>

    <!-- Script oficial do Google Model Viewer para AR -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</body>
</html>
