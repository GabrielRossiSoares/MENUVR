<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu VR — Login Cliente (Padrão)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login-split.css">
</head>

<body>
    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>

    <div class="split-container">
        <div class="split-left">
            <div class="burger-playground" id="burgerPlayground">
                <div class="drag-layer layer-pao-topo" data-layer="pao-topo"><img src="assets/pao_de_cima 1 (1).svg" alt="Pão do topo"></div>
                <div class="drag-layer layer-carne1" data-layer="carne1"><img src="assets/Carne-queijo.svg" alt="Carne"></div>
                <div class="drag-layer layer-tomate" data-layer="tomate"><img src="assets/Tomate.svg" alt="Tomate"></div>
                <div class="drag-layer layer-carne2" data-layer="carne2"><img src="assets/Carne-queijo.svg" alt="Carne"></div>
                <div class="drag-layer layer-alface" data-layer="alface"><img src="assets/Alface.svg" alt="Alface"></div>
                <div class="drag-layer layer-pao-baixo" data-layer="pao-baixo"><img src="assets/Pao_baixo.svg" alt="Pão de baixo"></div>
            </div>
            <button type="button" class="btn-remontar" id="btnRemontar">🍔 Remontar</button>
            <p class="playground-hint">Arraste as camadas do hambúrguer!</p>
        </div>

        <div class="split-right">
            <div class="form-card">
                <div class="logo-area"><img src="assets/Logo.svg" alt="Logo Menu VR"></div>
                <h1 class="form-title">Acessar Cardápio</h1>
                <p class="form-subtitle">Faça login com seu nome e telefone</p>

                <div class="form-group">
                    <label for="nome">Nome</label>
                    <div class="input-wrap" id="wrap-nome">
                        <span class="field-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                        <input type="text" id="nome" class="form-input" placeholder="Seu nome completo" autocomplete="name">
                    </div>
                    <span class="field-msg" id="msg-nome"></span>
                </div>

                <div class="form-group">
                    <label for="contato">Contato</label>
                    <div class="input-wrap" id="wrap-contato">
                        <span class="field-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.61 19a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 3.09 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 23 17z"/></svg></span>
                        <input type="tel" id="contato" class="form-input" placeholder="(00) 00000-0000" autocomplete="tel">
                    </div>
                    <span class="field-msg" id="msg-contato"></span>
                </div>

                <button type="button" class="btn-entrar" id="btnSubmit" disabled>Entrar</button>

                <div class="form-footer">
                    <div>
                        <span style="color: var(--text-muted); font-size: 0.85rem;">Não possui conta? </span>
                        <a href="cadastro-cliente.html" class="link-register">Cadastre-se</a>
                    </div>
                    <a href="admin-login.html" style="font-size: 0.75rem; margin-top: 4px;">Acesso Administrativo</a>
                    <p class="slogan">BG Tech Solutions - Do Manual ao Genial</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
        <div class="modal-box">
            <div class="modal-check"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
            <h2 class="modal-title">Login realizado<br>com sucesso!</h2>
            <p class="modal-sub">Bem-vindo ao Menu VR.<br>Redirecionando para o sistema…</p>
            <button type="button" class="modal-btn" id="modalOk">Continuar</button>
        </div>
    </div>

    <script src="burger-validate.js"></script>
    <script src="login-split.js"></script>
    <script>
        (() => {
            const states = { nome: false, contato: false };
            const btn = document.getElementById('btnSubmit');
            const update = BurgerValidate.bindBtn(btn, states);

            BurgerValidate.bindNome(document.getElementById('nome'), document.getElementById('wrap-nome'), document.getElementById('msg-nome'), v => { states.nome = v; update(); });
            BurgerValidate.bindContato(document.getElementById('contato'), document.getElementById('wrap-contato'), document.getElementById('msg-contato'), v => { states.contato = v; update(); });

            btn.addEventListener('click', () => {
                if (!states.nome || !states.contato) return;
                BurgerValidate.openModal(document.getElementById('modalBackdrop'));
            });
            BurgerValidate.bindModal(document.getElementById('modalBackdrop'), document.getElementById('modalOk'), 'cardapio.html');
        })();
    </script>
</body>

</html>
