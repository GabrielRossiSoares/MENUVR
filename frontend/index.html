<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu VR — Login Cliente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="burger.css">
    <style>
        /* ── 2 campos: nome + contato ── */
        .overlay-nome {
            top: 39%;
        }

        .overlay-contato {
            top: 54%;
        }

        .overlay-btn {
            top: 72%;
        }

        @media (max-width:480px) {
            .overlay-nome {
                top: 38%;
            }

            .overlay-contato {
                top: 53%;
            }

            .overlay-btn {
                top: 71%;
            }
        }
    </style>
</head>

<body>
    <svg class="light-rays" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.5" fill="none">
            <line x1="450" y1="450" x2="0" y2="0" />
            <line x1="450" y1="450" x2="150" y2="0" />
            <line x1="450" y1="450" x2="300" y2="0" />
            <line x1="450" y1="450" x2="450" y2="0" />
            <line x1="450" y1="450" x2="600" y2="0" />
            <line x1="450" y1="450" x2="750" y2="0" />
            <line x1="450" y1="450" x2="900" y2="0" />
            <line x1="450" y1="450" x2="900" y2="150" />
            <line x1="450" y1="450" x2="900" y2="300" />
            <line x1="450" y1="450" x2="900" y2="450" />
            <line x1="450" y1="450" x2="900" y2="600" />
            <line x1="450" y1="450" x2="900" y2="750" />
            <line x1="450" y1="450" x2="900" y2="900" />
            <line x1="450" y1="450" x2="750" y2="900" />
            <line x1="450" y1="450" x2="600" y2="900" />
            <line x1="450" y1="450" x2="450" y2="900" />
            <line x1="450" y1="450" x2="300" y2="900" />
            <line x1="450" y1="450" x2="150" y2="900" />
            <line x1="450" y1="450" x2="0" y2="900" />
            <line x1="450" y1="450" x2="0" y2="750" />
            <line x1="450" y1="450" x2="0" y2="600" />
            <line x1="450" y1="450" x2="0" y2="450" />
            <line x1="450" y1="450" x2="0" y2="300" />
            <line x1="450" y1="450" x2="0" y2="150" />
        </g>
    </svg>

    <div class="logo-wrap"><img src="assets/Logo.svg" alt="Logo Menu VR"></div>

    <div class="burger-stack">
        <div class="burger-layer layer-pao-topo"><img src="assets/pao_de_cima 1 (1).svg" alt="Pão do topo"></div>
        <div class="burger-layer layer-carne1"><img src="assets/Carne-queijo.svg" alt=""></div>
        <div class="burger-layer layer-tomate"><img src="assets/Tomate.svg" alt=""></div>
        <div class="burger-layer layer-carne2"><img src="assets/Carne-queijo.svg" alt=""></div>
        <div class="burger-layer layer-alface"><img src="assets/Alface.svg" alt=""></div>
        <div class="burger-layer layer-pao-baixo"><img src="assets/Pao_baixo.svg" alt="Pão de baixo"></div>

        <!-- Nome -->
        <div class="form-overlay overlay-nome">
            <div class="input-wrap" id="wrap-nome">
                <span class="field-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg></span>
                <input type="text" id="nome" class="glass-field" placeholder="Seu nome" autocomplete="name">
            </div>
            <span class="field-msg" id="msg-nome"></span>
        </div>

        <!-- Contato -->
        <div class="form-overlay overlay-contato">
            <div class="input-wrap" id="wrap-contato">
                <span class="field-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.61 19a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 3.09 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 23 17z" />
                    </svg></span>
                <input type="tel" id="contato" class="glass-field" placeholder="(00) 00000-0000" autocomplete="tel">
            </div>
            <span class="field-msg" id="msg-contato"></span>
        </div>

        <!-- Botão -->
        <div class="form-overlay overlay-btn">
            <button type="button" class="btn-entrar" id="btnSubmit" disabled>Entrar</button>
        </div>
    </div>

    <footer class="burger-footer">
        <a href="cadastro-cliente.html" class="footer-link">Não possui conta? <strong>Cadastre-se</strong></a>
        <a href="index.html" class="footer-link back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            Voltar
        </a>
        <p class="slogan">BG Tech Solutions - Do Manual ao Genial</p>
    </footer>

    <!-- Modal sucesso -->
    <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal-box">
            <div class="modal-icon success"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12" />
                </svg></div>
            <h2 class="modal-title">Login realizado<br>com sucesso!</h2>
            <p class="modal-sub">Bem-vindo ao Menu VR.<br>Redirecionando para o sistema…</p>
            <button type="button" class="modal-btn" id="modalOk">Continuar</button>
        </div>
    </div>

    <script src="burger-validate.js"></script>
    <script src="accessibility.js"></script>
    <script>
        (() => {
            const states = { nome: false, contato: false };
            const btn = document.getElementById('btnSubmit');
            const update = BurgerValidate.bindBtn(btn, states);

            BurgerValidate.bindNome(
                document.getElementById('nome'),
                document.getElementById('wrap-nome'),
                document.getElementById('msg-nome'),
                v => { states.nome = v; update(); }
            );
            BurgerValidate.bindContato(
                document.getElementById('contato'),
                document.getElementById('wrap-contato'),
                document.getElementById('msg-contato'),
                v => { states.contato = v; update(); }
            );

            btn.addEventListener('click', () => {
                if (!states.nome || !states.contato) return;
                BurgerValidate.openModal(document.getElementById('modalBackdrop'));
            });
            BurgerValidate.bindModal(document.getElementById('modalBackdrop'), document.getElementById('modalOk'), null);
        })();
    </script>
</body>

</html>
