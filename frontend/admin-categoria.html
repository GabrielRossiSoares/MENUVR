<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu VR — Categorias</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <!-- Mobile menu button -->
    <button class="mobile-menu-btn" aria-label="Abrir menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
    </button>
    <div class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-logo">
            <img src="assets/Logo.svg" alt="Logo Menu VR">
        </div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                </svg>
                Dashboard
            </a>
            <a href="admin-produto.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <path d="M16 10a4 4 0 0 1-8 0" />
                </svg>
                Produtos
            </a>
            <a href="admin-categoria.html" class="nav-item active">
                <svg viewBox="0 0 24 24">
                    <line x1="8" y1="6" x2="21" y2="6" />
                    <line x1="8" y1="12" x2="21" y2="12" />
                    <line x1="8" y1="18" x2="21" y2="18" />
                    <line x1="3" y1="6" x2="3.01" y2="6" />
                    <line x1="3" y1="12" x2="3.01" y2="12" />
                    <line x1="3" y1="18" x2="3.01" y2="18" />
                </svg>
                Categorias
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="admin-config.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
                Configurações
            </a>
            <a href="admin-login.html" class="nav-item logout">
                <svg viewBox="0 0 24 24">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Sair
            </a>
        </div>
    </aside>

    <!-- Main -->
    <main class="admin-main">
        <header class="admin-header">
            <h1 class="header-title">Categorias</h1>
        </header>

        <div class="admin-content">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 28px; max-width: 960px;">
                <!-- Left: List -->
                <div>
                    <h2 style="font-size: 1rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 16px;">
                        Categorias cadastradas
                    </h2>
                    <div class="category-list" id="categoryList">
                        <!-- rendered by JS -->
                    </div>
                    <div class="empty-state" id="emptyCategories" style="display:none; padding: 30px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="8" y1="6" x2="21" y2="6" />
                            <line x1="8" y1="12" x2="21" y2="12" />
                            <line x1="8" y1="18" x2="21" y2="18" />
                            <line x1="3" y1="6" x2="3.01" y2="6" />
                            <line x1="3" y1="12" x2="3.01" y2="12" />
                            <line x1="3" y1="18" x2="3.01" y2="18" />
                        </svg>
                        <h3>Nenhuma categoria</h3>
                        <p>Use o formulário ao lado para criar.</p>
                    </div>
                </div>

                <!-- Right: Form -->
                <div>
                    <div class="form-card" style="max-width: 100%;">
                        <h2 id="formTitle">Nova Categoria</h2>
                        <form id="categoriaForm" novalidate>
                            <input type="hidden" id="editId" value="">

                            <div class="form-group">
                                <label for="catNome">Nome <span class="required">*</span></label>
                                <input type="text" id="catNome" class="form-input" placeholder="Ex: Hambúrgueres"
                                    autocomplete="off">
                                <div class="form-error" id="err-catNome"></div>
                            </div>

                            <div class="form-group">
                                <label for="catDesc">Descrição</label>
                                <textarea id="catDesc" class="form-input" rows="3"
                                    placeholder="Descrição da categoria (opcional)"></textarea>
                            </div>

                            <div class="form-group">
                                <div class="toggle-wrap">
                                    <label class="toggle-switch">
                                        <input type="checkbox" id="catAtivo" checked>
                                        <span class="toggle-slider"></span>
                                    </label>
                                    <span class="toggle-label">Categoria ativa</span>
                                </div>
                            </div>

                            <div class="form-actions">
                                <button type="submit" class="btn-primary" id="btnSalvarCat">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                        stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                                        <polyline points="20 6 9 17 4 12" />
                                    </svg>
                                    <span id="btnSalvarText">Criar Categoria</span>
                                </button>
                                <button type="button" class="btn-secondary" id="btnCancelarEdit"
                                    style="display: none;">Cancelar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Delete Modal -->
    <div class="admin-modal-backdrop" id="confirmModal">
        <div class="admin-modal">
            <div class="modal-icon-wrap danger">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
            </div>
            <h3>Excluir categoria</h3>
            <p>Tem certeza que deseja excluir esta categoria?</p>
            <div class="modal-actions">
                <button class="btn-secondary" id="btnCancelDelete">Cancelar</button>
                <button class="btn-danger" id="btnConfirmDelete">Excluir</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        (() => {
            const catList = document.getElementById('categoryList');
            const emptyEl = document.getElementById('emptyCategories');
            const form = document.getElementById('categoriaForm');
            const nomeInput = document.getElementById('catNome');
            const descInput = document.getElementById('catDesc');
            const ativoCheck = document.getElementById('catAtivo');
            const editIdField = document.getElementById('editId');
            const formTitle = document.getElementById('formTitle');
            const btnText = document.getElementById('btnSalvarText');
            const btnCancelar = document.getElementById('btnCancelarEdit');

            const RULES = [
                { test: v => v.length >= 2, msg: 'Nome deve ter pelo menos 2 caracteres' },
            ];

            function renderList() {
                const cats = AdminStore.getCategorias();
                if (!cats.length) {
                    catList.innerHTML = '';
                    emptyEl.style.display = '';
                    return;
                }
                emptyEl.style.display = 'none';
                catList.innerHTML = cats.map(c => `
                    <div class="category-item">
                        <div class="category-info">
                            <span class="category-name">${c.nome}</span>
                            ${c.descricao ? `<span class="category-desc">${c.descricao}</span>` : ''}
                        </div>
                        <div class="category-actions">
                            <button class="status-badge ${c.ativo ? 'active' : 'inactive'}" data-toggle-id="${c.id}" title="${c.ativo ? 'Desativar' : 'Ativar'}">
                                <span class="status-dot"></span> ${c.ativo ? 'Ativa' : 'Inativa'}
                            </button>
                            <button class="btn-icon edit" data-edit-id="${c.id}" title="Editar">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <button class="btn-icon delete" data-delete-id="${c.id}" data-delete-name="${c.nome}" title="Excluir">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>
                    </div>
                `).join('');
            }

            function resetForm() {
                editIdField.value = '';
                nomeInput.value = '';
                descInput.value = '';
                ativoCheck.checked = true;
                formTitle.textContent = 'Nova Categoria';
                btnText.textContent = 'Criar Categoria';
                btnCancelar.style.display = 'none';
                AdminUI.clearValidation(nomeInput, document.getElementById('err-catNome'));
            }

            // List click events
            catList.addEventListener('click', e => {
                // Toggle
                const toggleBtn = e.target.closest('[data-toggle-id]');
                if (toggleBtn) {
                    AdminStore.toggleCategoria(toggleBtn.dataset.toggleId);
                    renderList();
                    return;
                }

                // Edit
                const editBtn = e.target.closest('[data-edit-id]');
                if (editBtn) {
                    const cat = AdminStore.getCategoriaById(editBtn.dataset.editId);
                    if (!cat) return;
                    editIdField.value = cat.id;
                    nomeInput.value = cat.nome;
                    descInput.value = cat.descricao || '';
                    ativoCheck.checked = cat.ativo;
                    formTitle.textContent = 'Editar Categoria';
                    btnText.textContent = 'Atualizar';
                    btnCancelar.style.display = '';
                    nomeInput.focus();
                    return;
                }

                // Delete
                const deleteBtn = e.target.closest('[data-delete-id]');
                if (deleteBtn) {
                    const id = deleteBtn.dataset.deleteId;
                    const name = deleteBtn.dataset.deleteName;
                    AdminUI.confirmModal(
                        'Excluir categoria',
                        `Tem certeza que deseja excluir "${name}"?`,
                        () => {
                            const result = AdminStore.removeCategoria(id);
                            if (result.error) {
                                AdminUI.toast(result.error, 'error');
                            } else {
                                renderList();
                                AdminUI.toast('Categoria excluída.');
                                if (editIdField.value === id) resetForm();
                            }
                        }
                    );
                }
            });

            btnCancelar.addEventListener('click', resetForm);

            // Submit
            form.addEventListener('submit', e => {
                e.preventDefault();
                if (!AdminUI.validateField(nomeInput, document.getElementById('err-catNome'), RULES)) return;

                const data = {
                    nome: nomeInput.value.trim(),
                    descricao: descInput.value.trim(),
                    ativo: ativoCheck.checked,
                };

                let result;
                if (editIdField.value) {
                    result = AdminStore.updateCategoria(editIdField.value, data);
                } else {
                    result = AdminStore.createCategoria(data);
                }

                if (result.error) {
                    AdminUI.toast(result.error, 'error');
                    return;
                }

                AdminUI.toast(editIdField.value ? 'Categoria atualizada!' : 'Categoria criada!');
                resetForm();
                renderList();
            });

            nomeInput.addEventListener('blur', () => AdminUI.validateField(nomeInput, document.getElementById('err-catNome'), RULES));

            AdminUI.initSidebar();
            renderList();
        })();
    </script>
</body>

</html>
