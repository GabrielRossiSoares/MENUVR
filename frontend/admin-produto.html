<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu VR — Produto</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <!-- Mobile menu button -->
    <button class="mobile-menu-btn" aria-label="Abrir menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
    </button>
    <div class="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-logo">
            <img src="assets/Logo.svg" alt="Logo Menu VR">
        </div>
        <nav class="sidebar-nav">
            <a href="admin-dashboard.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                </svg>
                Dashboard
            </a>
            <a href="admin-produto.html" class="nav-item active">
                <svg viewBox="0 0 24 24">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <path d="M16 10a4 4 0 0 1-8 0" />
                </svg>
                Produtos
            </a>
            <a href="admin-categoria.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <line x1="8" y1="6" x2="21" y2="6" />
                    <line x1="8" y1="12" x2="21" y2="12" />
                    <line x1="8" y1="18" x2="21" y2="18" />
                    <line x1="3" y1="6" x2="3.01" y2="6" />
                    <line x1="3" y1="12" x2="3.01" y2="12" />
                    <line x1="3" y1="18" x2="3.01" y2="18" />
                </svg>
                Categorias
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="admin-config.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
                Configurações
            </a>
            <a href="admin-login.html" class="nav-item logout">
                <svg viewBox="0 0 24 24">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Sair
            </a>
        </div>
    </aside>

    <!-- Main -->
    <main class="admin-main">
        <header class="admin-header">
            <h1 class="header-title" id="pageTitle">Novo Produto</h1>
            <div class="header-actions">
                <a href="admin-dashboard.html" class="btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" width="16" height="16">
                        <line x1="19" y1="12" x2="5" y2="12" />
                        <polyline points="12 19 5 12 12 5" />
                    </svg>
                    Voltar
                </a>
            </div>
        </header>

        <div class="admin-content">
            <div class="form-card">
                <h2 id="formCardTitle">Cadastrar Produto</h2>
                <form id="produtoForm" novalidate>
                    <!-- Nome -->
                    <div class="form-group">
                        <label for="nome">Nome do produto <span class="required">*</span></label>
                        <input type="text" id="nome" class="form-input" placeholder="Ex: Smash Burger Clássico"
                            autocomplete="off">
                        <div class="form-error" id="err-nome"></div>
                    </div>

                    <div class="form-row">
                        <!-- Categoria -->
                        <div class="form-group">
                            <label for="categoria">Categoria <span class="required">*</span></label>
                            <select id="categoria" class="form-input"></select>
                            <div class="form-error" id="err-categoria"></div>
                        </div>
                        <!-- Preço -->
                        <div class="form-group">
                            <label for="preco">Preço (R$) <span class="required">*</span></label>
                            <input type="text" id="preco" class="form-input" placeholder="0,00" inputmode="decimal"
                                autocomplete="off">
                            <div class="form-error" id="err-preco"></div>
                        </div>
                    </div>

                    <!-- Descrição -->
                    <div class="form-group">
                        <label for="descricao">Descrição</label>
                        <textarea id="descricao" class="form-input" rows="3"
                            placeholder="Descreva o produto..."></textarea>
                    </div>

                    <!-- Upload Imagem -->
                    <div class="form-group">
                        <label>Imagem do produto</label>
                        <div class="upload-area" id="uploadImagem">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" />
                                <circle cx="8.5" cy="8.5" r="1.5" />
                                <path d="M21 15l-5-5L5 21" />
                            </svg>
                            <p>Clique ou arraste para enviar</p>
                            <span class="upload-hint">JPG ou PNG</span>
                            <input type="file" id="imagemFile" accept="image/jpeg,image/png">
                        </div>
                        <div class="upload-preview" id="imagemPreview">
                            <img src="" alt="Preview">
                            <span class="file-name"></span>
                            <button type="button" class="remove-file" data-target="imagemFile">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18" />
                                    <line x1="6" y1="6" x2="18" y2="18" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Upload 3D -->
                    <div class="form-group">
                        <label>Modelo 3D (opcional)</label>
                        <div class="upload-area" id="upload3D">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                                <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                                <line x1="12" y1="22.08" x2="12" y2="12" />
                            </svg>
                            <p>Clique ou arraste para enviar</p>
                            <span class="upload-hint">GLB ou GLTF</span>
                            <input type="file" id="modelo3dFile" accept=".glb,.gltf">
                        </div>
                        <div class="upload-preview" id="modelo3dPreview">
                            <span class="file-name"></span>
                            <button type="button" class="remove-file" data-target="modelo3dFile">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="18" y1="6" x2="6" y2="18" />
                                    <line x1="6" y1="6" x2="18" y2="18" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Ativo toggle -->
                    <div class="form-group">
                        <div class="toggle-wrap">
                            <label class="toggle-switch">
                                <input type="checkbox" id="ativo" checked>
                                <span class="toggle-slider"></span>
                            </label>
                            <span class="toggle-label">Produto ativo (visível no cardápio)</span>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="btnSalvar">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                                <polyline points="20 6 9 17 4 12" />
                            </svg>
                            Salvar Produto
                        </button>
                        <a href="admin-dashboard.html" class="btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="admin.js"></script>
    <script>
        (() => {
            const params = new URLSearchParams(window.location.search);
            const editId = params.get('id');
            const isEdit = !!editId;

            const form = document.getElementById('produtoForm');
            const nomeInput = document.getElementById('nome');
            const catSelect = document.getElementById('categoria');
            const precoInput = document.getElementById('preco');
            const descInput = document.getElementById('descricao');
            const ativoCheck = document.getElementById('ativo');
            const imagemFile = document.getElementById('imagemFile');
            const modelo3dFile = document.getElementById('modelo3dFile');

            // Populate categories
            AdminUI.populateCategorySelect(catSelect);

            // Price mask
            precoInput.addEventListener('input', () => {
                let v = precoInput.value.replace(/[^\d,]/g, '');
                precoInput.value = v;
            });

            // File previews
            function setupUpload(fileInput, previewEl, isImage) {
                fileInput.addEventListener('change', () => {
                    const file = fileInput.files[0];
                    if (!file) return;
                    previewEl.classList.add('has-file');
                    previewEl.querySelector('.file-name').textContent = file.name;
                    if (isImage && file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = e => {
                            const img = previewEl.querySelector('img');
                            if (img) img.src = e.target.result;
                        };
                        reader.readAsDataURL(file);
                    }
                });

                const removeBtn = previewEl.querySelector('.remove-file');
                if (removeBtn) {
                    removeBtn.addEventListener('click', () => {
                        fileInput.value = '';
                        previewEl.classList.remove('has-file');
                        const img = previewEl.querySelector('img');
                        if (img) img.src = '';
                    });
                }
            }

            setupUpload(imagemFile, document.getElementById('imagemPreview'), true);
            setupUpload(modelo3dFile, document.getElementById('modelo3dPreview'), false);

            // Edit mode
            if (isEdit) {
                const prod = AdminStore.getProdutoById(editId);
                if (prod) {
                    document.getElementById('pageTitle').textContent = 'Editar Produto';
                    document.getElementById('formCardTitle').textContent = 'Editar Produto';
                    document.getElementById('btnSalvar').innerHTML = `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="20 6 9 17 4 12"/></svg>
                        Atualizar Produto
                    `;
                    nomeInput.value = prod.nome;
                    catSelect.value = prod.categoria_id;
                    precoInput.value = prod.preco.toFixed(2).replace('.', ',');
                    descInput.value = prod.descricao || '';
                    ativoCheck.checked = prod.ativo;
                }
            }

            // Validation rules
            const RULES = {
                nome: [
                    { test: v => v.length >= 2, msg: 'Nome deve ter pelo menos 2 caracteres' },
                ],
                categoria: [
                    { test: v => v !== '', msg: 'Selecione uma categoria' },
                ],
                preco: [
                    { test: v => v !== '', msg: 'Informe o preço' },
                    { test: v => { const n = parseFloat(v.replace(',', '.')); return !isNaN(n) && n > 0; }, msg: 'Preço deve ser positivo' },
                ],
            };

            // Live validation
            nomeInput.addEventListener('blur', () => AdminUI.validateField(nomeInput, document.getElementById('err-nome'), RULES.nome));
            catSelect.addEventListener('change', () => AdminUI.validateField(catSelect, document.getElementById('err-categoria'), RULES.categoria));
            precoInput.addEventListener('blur', () => AdminUI.validateField(precoInput, document.getElementById('err-preco'), RULES.preco));

            // Submit
            form.addEventListener('submit', e => {
                e.preventDefault();

                const v1 = AdminUI.validateField(nomeInput, document.getElementById('err-nome'), RULES.nome);
                const v2 = AdminUI.validateField(catSelect, document.getElementById('err-categoria'), RULES.categoria);
                const v3 = AdminUI.validateField(precoInput, document.getElementById('err-preco'), RULES.preco);

                if (!v1 || !v2 || !v3) return;

                const data = {
                    nome: nomeInput.value.trim(),
                    categoria_id: catSelect.value,
                    preco: parseFloat(precoInput.value.replace(',', '.')),
                    descricao: descInput.value.trim(),
                    ativo: ativoCheck.checked,
                    imagem_url: '',
                    modelo3d_url: '',
                };

                // Handle image (store as data URL for demo)
                const imgFile = imagemFile.files[0];
                if (imgFile) {
                    const reader = new FileReader();
                    reader.onload = ev => {
                        data.imagem_url = ev.target.result;
                        saveProduct(data);
                    };
                    reader.readAsDataURL(imgFile);
                } else {
                    if (isEdit) {
                        const existing = AdminStore.getProdutoById(editId);
                        if (existing) data.imagem_url = existing.imagem_url;
                    }
                    saveProduct(data);
                }
            });

            function saveProduct(data) {
                let result;
                if (isEdit) {
                    result = AdminStore.updateProduto(editId, data);
                } else {
                    result = AdminStore.createProduto(data);
                }

                if (result.error) {
                    AdminUI.toast(result.error, 'error');
                    return;
                }

                AdminUI.toast(isEdit ? 'Produto atualizado!' : 'Produto criado com sucesso!');
                setTimeout(() => window.location.href = 'admin-dashboard.html', 800);
            }

            AdminUI.initSidebar();
        })();
    </script>
</body>

</html>
