<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu VR — Cadastro Funcionário</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="burger.css">
    <style>
        /* ── 4 campos: nome + email + contato + senha ── */
        .overlay-nome {
            top: 27%;
        }

        .overlay-email {
            top: 39%;
        }

        .overlay-contato {
            top: 51%;
        }

        .overlay-senha {
            top: 63%;
        }

        .overlay-btn {
            top: 76%;
        }

        .hints-wrap {
            top: calc(63% + 52px);
        }

        @media (max-width:480px) {
            .overlay-nome {
                top: 26%;
            }

            .overlay-email {
                top: 38%;
            }

            .overlay-contato {
                top: 50%;
            }

            .overlay-senha {
                top: 62%;
            }

            .overlay-btn {
                top: 75%;
            }

            .hints-wrap {
                top: calc(62% + 52px);
            }
        }
    </style>
</head>

<body>
    <svg class="light-rays" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.5" fill="none">
            <line x1="450" y1="450" x2="0" y2="0" />
            <line x1="450" y1="450" x2="150" y2="0" />
            <line x1="450" y1="450" x2="300" y2="0" />
            <line x1="450" y1="450" x2="450" y2="0" />
            <line x1="450" y1="450" x2="600" y2="0" />
            <line x1="450" y1="450" x2="750" y2="0" />
            <line x1="450" y1="450" x2="900" y2="0" />
            <line x1="450" y1="450" x2="900" y2="150" />
            <line x1="450" y1="450" x2="900" y2="300" />
            <line x1="450" y1="450" x2="900" y2="450" />
            <line x1="450" y1="450" x2="900" y2="600" />
            <line x1="450" y1="450" x2="900" y2="750" />
            <line x1="450" y1="450" x2="900" y2="900" />
            <line x1="450" y1="450" x2="750" y2="900" />
            <line x1="450" y1="450" x2="600" y2="900" />
            <line x1="450" y1="450" x2="450" y2="900" />
            <line x1="450" y1="450" x2="300" y2="900" />
            <line x1="450" y1="450" x2="150" y2="900" />
            <line x1="450" y1="450" x2="0" y2="900" />
            <line x1="450" y1="450" x2="0" y2="750" />
            <line x1="450" y1="450" x2="0" y2="600" />
            <line x1="450" y1="450" x2="0" y2="450" />
            <line x1="450" y1="450" x2="0" y2="300" />
            <line x1="450" y1="450" x2="0" y2="150" />
        </g>
    </svg>

    <div class="logo-wrap"><img src="assets/Logo.svg" alt="Logo Menu VR"></div>

    <div class="burger-stack">
        <div class="burger-layer layer-pao-topo"><img src="assets/pao_de_cima 1 (1).svg" alt="Pão do topo"></div>
        <div class="burger-layer layer-carne1"><img src="assets/Carne-queijo.svg" alt=""></div>
        <div class="burger-layer layer-tomate"><img src="assets/Tomate.svg" alt=""></div>
        <div class="burger-layer layer-carne2"><img src="assets/Carne-queijo.svg" alt=""></div>
        <div class="burger-layer layer-alface"><img src="assets/Alface.svg" alt=""></div>
        <div class="burger-layer layer-pao-baixo"><img src="assets/Pao_baixo.svg" alt="Pão de baixo"></div>

        <!-- Nome -->
        <div class="form-overlay overlay-nome">
            <div class="input-wrap" id="wrap-nome">
                <span class="field-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg></span>
                <input type="text" id="nome" class="glass-field" placeholder="Nome completo" autocomplete="name">
            </div>
            <span class="field-msg" id="msg-nome"></span>
        </div>

        <!-- E-mail -->
        <div class="form-overlay overlay-email">
            <div class="input-wrap" id="wrap-email">
                <span class="field-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                        <polyline points="22,6 12,13 2,6" />
                    </svg></span>
                <input type="email" id="email" class="glass-field" placeholder="E-mail corporativo"
                    autocomplete="email">
            </div>
            <span class="field-msg" id="msg-email"></span>
        </div>

        <!-- Contato -->
        <div class="form-overlay overlay-contato">
            <div class="input-wrap" id="wrap-contato">
                <span class="field-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.61 19a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 3.09 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 23 17z" />
                    </svg></span>
                <input type="tel" id="contato" class="glass-field" placeholder="(00) 00000-0000" autocomplete="tel">
            </div>
            <span class="field-msg" id="msg-contato"></span>
        </div>

        <!-- Senha -->
        <div class="form-overlay overlay-senha">
            <div class="input-wrap" id="wrap-senha">
                <span class="field-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg></span>
                <input type="password" id="senha" class="glass-field" placeholder="Crie uma senha"
                    autocomplete="new-password">
                <button type="button" class="eye-btn" id="toggleSenha" aria-label="Mostrar/ocultar senha">
                    <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </button>
            </div>
            <span class="field-msg" id="msg-senha"></span>
        </div>

        <!-- Hints senha -->
        <div class="password-hints-wrap hints-wrap">
            <div class="password-hints" id="senha-hints">
                <div class="hint" id="hint-len"> <span class="hint-dot"></span> Mínimo 8 caracteres</div>
                <div class="hint" id="hint-upper"><span class="hint-dot"></span> 1 letra maiúscula</div>
                <div class="hint" id="hint-lower"><span class="hint-dot"></span> 1 letra minúscula</div>
                <div class="hint" id="hint-num"> <span class="hint-dot"></span> 1 número</div>
                <div class="hint" id="hint-spec"> <span class="hint-dot"></span> 1 caractere especial</div>
            </div>
        </div>

        <!-- Botão -->
        <div class="form-overlay overlay-btn">
            <button type="button" class="btn-entrar" id="btnSubmit" disabled>Criar Credencial</button>
        </div>
    </div>

    <footer class="burger-footer">
        <a href="index.html" class="footer-link back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            Voltar
        </a>
        <p class="slogan">BG Tech Solutions - Do Manual ao Genial</p>
    </footer>

    <!-- Modal sucesso -->
    <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal-box">
            <div class="modal-icon success"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12" />
                </svg></div>
            <h2 class="modal-title">Credencial criada<br>com sucesso!</h2>
            <p class="modal-sub">O acesso administrativo foi configurado.<br>Redirecionando para o login…</p>
            <button type="button" class="modal-btn" id="modalOk">Continuar</button>
        </div>
    </div>

    <script src="burger-validate.js"></script>
    <script>
        (() => {
            const states = { nome: false, email: false, contato: false, senha: false };
            const btn = document.getElementById('btnSubmit');
            const update = BurgerValidate.bindBtn(btn, states);

            BurgerValidate.bindNome(document.getElementById('nome'), document.getElementById('wrap-nome'), document.getElementById('msg-nome'), v => { states.nome = v; update(); });
            BurgerValidate.bindEmail(document.getElementById('email'), document.getElementById('wrap-email'), document.getElementById('msg-email'), v => { states.email = v; update(); });
            BurgerValidate.bindContato(document.getElementById('contato'), document.getElementById('wrap-contato'), document.getElementById('msg-contato'), v => { states.contato = v; update(); });
            BurgerValidate.bindSenha(document.getElementById('senha'), document.getElementById('wrap-senha'), document.getElementById('msg-senha'), document.getElementById('senha-hints'), null, v => { states.senha = v; update(); });
            BurgerValidate.bindEye(document.getElementById('toggleSenha'), document.getElementById('senha'), document.getElementById('eyeIcon'));

            btn.addEventListener('click', () => {
                if (!Object.values(states).every(Boolean)) return;
                BurgerValidate.openModal(document.getElementById('modalBackdrop'));
            });
            BurgerValidate.bindModal(document.getElementById('modalBackdrop'), document.getElementById('modalOk'), 'index.html');
        })();
    </script>
</body>

</html>
