<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu VR — Recuperar Senha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="burger.css">
    <style>
        /* ── 1 campo: email ── */
        .overlay-email {
            top: 44%;
        }

        .overlay-btn {
            top: 63%;
        }

        @media (max-width:480px) {
            .overlay-email {
                top: 43%;
            }

            .overlay-btn {
                top: 62%;
            }
        }
    </style>
</head>

<body>
    <svg class="light-rays" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.5" fill="none">
            <line x1="450" y1="450" x2="0" y2="0" />
            <line x1="450" y1="450" x2="150" y2="0" />
            <line x1="450" y1="450" x2="300" y2="0" />
            <line x1="450" y1="450" x2="450" y2="0" />
            <line x1="450" y1="450" x2="600" y2="0" />
            <line x1="450" y1="450" x2="750" y2="0" />
            <line x1="450" y1="450" x2="900" y2="0" />
            <line x1="450" y1="450" x2="900" y2="150" />
            <line x1="450" y1="450" x2="900" y2="300" />
            <line x1="450" y1="450" x2="900" y2="450" />
            <line x1="450" y1="450" x2="900" y2="600" />
            <line x1="450" y1="450" x2="900" y2="750" />
            <line x1="450" y1="450" x2="900" y2="900" />
            <line x1="450" y1="450" x2="750" y2="900" />
            <line x1="450" y1="450" x2="600" y2="900" />
            <line x1="450" y1="450" x2="450" y2="900" />
            <line x1="450" y1="450" x2="300" y2="900" />
            <line x1="450" y1="450" x2="150" y2="900" />
            <line x1="450" y1="450" x2="0" y2="900" />
            <line x1="450" y1="450" x2="0" y2="750" />
            <line x1="450" y1="450" x2="0" y2="600" />
            <line x1="450" y1="450" x2="0" y2="450" />
            <line x1="450" y1="450" x2="0" y2="300" />
            <line x1="450" y1="450" x2="0" y2="150" />
        </g>
    </svg>

    <div class="logo-wrap"><img src="assets/Logo.svg" alt="Logo Menu VR"></div>

    <div class="burger-stack">
        <div class="burger-layer layer-pao-topo"><img src="assets/pao_de_cima 1 (1).svg" alt="Pão do topo"></div>
        <div class="burger-layer layer-carne1"><img src="assets/Carne-queijo.svg" alt=""></div>
        <div class="burger-layer layer-tomate"><img src="assets/Tomate.svg" alt=""></div>
        <div class="burger-layer layer-carne2"><img src="assets/Carne-queijo.svg" alt=""></div>
        <div class="burger-layer layer-alface"><img src="assets/Alface.svg" alt=""></div>
        <div class="burger-layer layer-pao-baixo"><img src="assets/Pao_baixo.svg" alt="Pão de baixo"></div>

        <!-- E-mail -->
        <div class="form-overlay overlay-email">
            <div class="input-wrap" id="wrap-email">
                <span class="field-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                        <polyline points="22,6 12,13 2,6" />
                    </svg></span>
                <input type="email" id="email" class="glass-field" placeholder="Seu e-mail cadastrado"
                    autocomplete="email">
            </div>
            <span class="field-msg" id="msg-email"></span>
        </div>

        <!-- Botão -->
        <div class="form-overlay overlay-btn">
            <button type="button" class="btn-entrar" id="btnSubmit" disabled>Enviar Código</button>
        </div>
    </div>

    <footer class="burger-footer">
        <a href="index.html" class="footer-link">Lembrou a senha? <strong>Entrar</strong></a>
        <a href="index.html" class="footer-link back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            Voltar
        </a>
        <p class="slogan">BG Tech Solutions - Do Manual ao Genial</p>
    </footer>

    <!-- Modal: código enviado -->
    <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal-box">
            <div class="modal-icon info">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#1565D8" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                    <polyline points="22,6 12,13 2,6" />
                </svg>
            </div>
            <h2 class="modal-title">Código enviado!</h2>
            <p class="modal-sub">Verifique sua caixa de entrada e insira o código de confirmação na próxima tela.</p>
            <button type="button" class="modal-btn" id="modalOk">Inserir Código</button>
        </div>
    </div>

    <script src="burger-validate.js"></script>
    <script>
        (() => {
            const states = { email: false };
            const btn = document.getElementById('btnSubmit');
            const update = BurgerValidate.bindBtn(btn, states);

            BurgerValidate.bindEmail(document.getElementById('email'), document.getElementById('wrap-email'), document.getElementById('msg-email'), v => { states.email = v; update(); });

            btn.addEventListener('click', () => {
                if (!states.email) return;
                BurgerValidate.openModal(document.getElementById('modalBackdrop'));
            });
            BurgerValidate.bindModal(document.getElementById('modalBackdrop'), document.getElementById('modalOk'), 'codigo-confirmacao.html');
        })();
    </script>
</body>

</html>
